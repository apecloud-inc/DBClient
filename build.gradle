// Apply the java plugin to add support for Java

plugins {
    id 'com.gradleup.shadow' version '8.3.0' // 使用最新版本替换x.y.z
    id 'application'
}

mainClassName = 'OneClient'

shadowJar {
    // 将依赖打包进 JAR
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    
    // 配置输出的文件名
    archiveBaseName.set('oneclient')
    archiveClassifier.set('all')
    archiveVersion.set('1.0')
    
    // 合并相同的文件
    mergeServiceFiles()
    // 排除签名文件
    exclude 'META-INF/*.RSA', 'META-INF/*.SF','META-INF/*.DSA'

    zip64 true
}

sourceSets {
    main {
        java {
            srcDirs = ['src/main/java']
        }
        resources {
            srcDirs = ['src/main/resources']
        }
    }
    test {
        java {
            srcDirs = ['src/test/java']
        }
    }
}


// In this section you declare where to find the dependencies of your project
repositories {
    // Use jcenter for resolving your dependencies.
    // You can declare any Maven/Ivy/file repository here.
    jcenter()
}

dependencies {
    // This dependency is found on compile classpath of this component and consumers.
    implementation 'com.google.guava:guava:23.0'

    // Use JUnit test framework
    testImplementation 'junit:junit:4.12'

    // Use SLF4J
    implementation group: 'org.slf4j', name: 'slf4j-api', version: '1.7.30'
    runtimeOnly group: 'org.slf4j', name: 'slf4j-api', version: '1.7.30'
    implementation group: 'ch.qos.logback', name: 'logback-classic', version: '1.4.12'
    runtimeOnly group: 'ch.qos.logback', name: 'logback-classic', version: '1.2.3'

    // This is for MySQL Java connector
    implementation group: 'mysql', name: 'mysql-connector-java', version: '8.0.28'
    runtimeOnly group: 'mysql', name: 'mysql-connector-java', version: '8.0.15'

    // This is for PostgreSQL Java connector
    implementation group: 'org.postgresql', name: 'postgresql', version: '42.0.0'
    runtimeOnly group: 'org.postgresql', name: 'postgresql'

    // This is for Gbase8c Java connector
    implementation files('libs/GBase8cV5_JDBC_3.0.0/gbase8c-jdbc-3.0.0B02.jar')

    // This is for MongoDB Java connector
    implementation group: 'org.mongodb', name: 'mongodb-driver-sync', version: '4.6.1'
    runtimeOnly group: 'org.mongodb', name: 'mongodb-driver-reactivestreams', version: '4.6.1'

    // This is for Redis Sentinel connector
    implementation group: 'redis.clients', name: 'jedis', version: '3.7.0'
    runtimeOnly group: 'redis.clients', name: 'jedis', version: '3.7.0'

    // This is for Kafka connector
    implementation group: 'org.apache.kafka', name: 'kafka-clients', version: '2.8.0'
    runtimeOnly group: 'org.apache.kafka', name: 'kafka-clients', version: '2.8.0'

    // This is for Qdrant connect
    implementation 'io.qdrant:client:1.12.0'  // 确保使用最新版本
    implementation group: 'org.apache.httpcomponents', name: 'httpclient', version: '4.5.13'
    runtimeOnly group: 'org.apache.httpcomponents', name: 'httpclient', version: '4.5.13'
    implementation group: 'com.fasterxml.jackson.core', name: 'jackson-databind', version: '2.13.0'
    runtimeOnly group: 'com.fasterxml.jackson.core', name: 'jackson-databind', version: '2.13.0'

    // This is for Pulsar connector
    implementation group: 'org.apache.pulsar', name: 'pulsar-client', version: '2.10.0'
    runtimeOnly group: 'org.apache.pulsar', name: 'pulsar-client', version: '2.10.0'

    // This is for Elasticsearch connector
    implementation 'co.elastic.clients:elasticsearch-java:8.8.2'

    // This is for ClickHouse connector
    implementation 'ru.yandex.clickhouse:clickhouse-jdbc:0.3.2'

    // This is for Weaviate connector
    implementation 'io.weaviate:client:4.7.0'

    // This is for GreptimeDB connector
    implementation 'io.greptime:ingester-all:0.7.3'

    // This is for Nebula connector
    implementation 'com.vesoft:client:3.8.0'
    implementation 'com.alibaba:fastjson:2.0.51'

    // This is for Milvus connector
    implementation 'io.milvus:milvus-sdk-java:2.4.1'

    // This is for Oracle connector
    implementation 'com.oracle.database.jdbc:ojdbc8:19.3.0.0'

    // This is for Flink connector
    implementation 'org.apache.flink:flink-java:1.19.1'
    implementation 'org.apache.flink:flink-streaming-java:1.19.1'
    implementation 'org.apache.flink:flink-clients:1.19.1'

    // This is for MariaDB connector
    implementation 'org.mariadb.jdbc:mariadb-java-client:3.3.3'

    // This is for YashanDB connector
    implementation 'com.yashandb:yashandb-jdbc:1.6.1'

    // This is for DMDB connector
    implementation 'com.dameng:Dm7JdbcDriver18:7.6.0.165'

    // This is for InfluxDB connector
    implementation 'com.influxdb:influxdb-client-java:3.2.0'

    // This is for OpenLDAP connector
    // implementation 'com.sun.jldap:jldap-client-sdk:1.0.1'

    // This is for ZooKeeper connector
    implementation 'org.apache.zookeeper:zookeeper:3.6.3'

    // This is for MinIO connector
    implementation 'io.minio:minio:8.5.11'

    // This is for etcd connector
    implementation 'com.coreos:jetcd-core:0.0.1'

    // This is for Halo connector
    // implementation 'com.halo.client:halo-jdbc:0.5.0'

    // This is for OpenGauss connector
    implementation 'org.opengauss:opengauss-jdbc:6.0.0-RC1-og'

    // This is for TDengine connector
    implementation 'com.taosdata.jdbc:taos-jdbcdriver:3.3.0'

    // This is for Solr connector
    implementation 'org.apache.solr:solr-solrj:8.11.1'

    // This is for OpenSearch connector
    implementation 'org.opensearch.client:opensearch-rest-high-level-client:1.2.4'
    implementation 'org.apache.httpcomponents.client5:httpclient5:5.2.1'

    // This is for TiDB connector
    implementation 'com.pingcap.tikv:tikv-client-java:3.0.0'

    // This is for MogDB connector
    implementation 'io.mogdb:mogdb-jdbc:5.0.0.8.mg'
}


